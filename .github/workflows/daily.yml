name: Daily Real Estate Update

on:
  schedule:
    - cron: '0 11 * * *'   # 20:00 KST (UTC+9 = UTC 11:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch real estate data
        run: python fetch.py

      - name: Check alert conditions
        run: python alert.py
        env:
          KAKAO_TOKEN_JSON: ${{ secrets.KAKAO_TOKEN_JSON }}

      - name: Commit and push updated data
        run: |
          # 해외 IP(네이버 차단) 등으로 0건이면 기존 데이터를 덮어쓰지 않고 건너뜀
          COUNT=$(python -c "import re; s=open('data.js',encoding='utf-8').read(); m=re.search(r'\"총매물\":\s*(\d+)', s); print(m.group(1) if m else 0)")
          echo "수집 매물 수: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::warning::매물 0건 — 해외 IP 차단 추정. 커밋 건너뜀(기존 데이터 보존)."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data.js data.json 단지목록.json
          git diff --cached --quiet && echo "변경 없음" || (
            git commit -m "data: auto update $(date +'%Y-%m-%d %H:%M') KST" &&
            git push
          )
