name: Daily Real Estate Update

# [비활성화] GitHub 러너는 해외 IP라 네이버 부동산 API가 차단됨 → 수집이 항상 0건.
# 실 수집·알림은 로컬(한국 IP) 자동수집.bat + 로컬 스케줄 작업이 담당한다.
# 스케줄 자동 실행을 제거하고, 필요 시에만 Actions 탭에서 수동 실행(workflow_dispatch)한다.
on:
  workflow_dispatch:        # 수동 실행 버튼 (자동 스케줄 없음)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch real estate data
        run: python fetch.py

      - name: Check alert conditions
        run: python alert.py
        env:
          KAKAO_TOKEN_JSON: ${{ secrets.KAKAO_TOKEN_JSON }}

      - name: Commit and push updated data
        run: |
          # 해외 IP(네이버 차단) 등으로 0건이면 기존 데이터를 덮어쓰지 않고 건너뜀
          COUNT=$(python -c "import re; s=open('data.js',encoding='utf-8').read(); m=re.search(r'\"총매물\":\s*(\d+)', s); print(m.group(1) if m else 0)")
          echo "수집 매물 수: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::warning::매물 0건 — 해외 IP 차단 추정. 커밋 건너뜀(기존 데이터 보존)."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data.js data.json 단지목록.json
          git diff --cached --quiet && echo "변경 없음" || (
            git commit -m "data: auto update $(date +'%Y-%m-%d %H:%M') KST" &&
            git push
          )
